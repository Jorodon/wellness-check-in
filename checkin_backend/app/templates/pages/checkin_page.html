<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gator Check-In</title>
    <link href="../../static/css/output.css" rel="stylesheet">
    
    <style>
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 2px;
            background: #000;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background: #000;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>

</head>
<body class="bg-[#f5f5f5] min-h-screen flex items-center justify-center font-sans text-black">

    <div class="border border-black p-8 w-[95%] max-w-5xl bg-white shadow-sm">
        <h1 class="text-3xl text-center mb-10 font-medium">Daily Check-In</h1>

        <div class="bg-[#eeeeee] border border-gray-300 p-12 mx-auto w-[90%]">
            <form class="space-y-12">

                <div class="flex flex-col">
                    <div class="flex justify-between text-sm font-bold mb-1">
                        <span>Mood Levels</span>
                        <span id="moodVal">1</span>
                    </div>
                    <input type="range" id="mood" min="1" max="5" value="1" oninput="updateVal('mood')">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>Poor</span><span>Great</span>
                    </div>
                </div>

                <div class="flex flex-col">
                    <div class="flex justify-between text-sm font-bold mb-1">
                        <span>Stress Levels</span>
                        <span id="stressVal">1</span>
                    </div>
                    <input type="range" id="stress" min="1" max="5" value="1" oninput="updateVal('stress')">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>Poor</span><span>Great</span>
                    </div>
                </div>

                <div class="flex flex-col">
                    <div class="flex justify-between text-sm font-bold mb-1">
                        <span>Energy Levels</span>
                        <span id="energyVal">1</span>
                    </div>
                    <input type="range" id="energy" min="1" max="5" value="1" oninput="updateVal('energy')">
                    <div class="flex justify-between text-xs text-gray-500 mt-1">
                        <span>Poor</span><span>Great</span>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <label class="text-sm font-bold whitespace-nowrap" for="sleep">Sleep Hours</label>
                    <input type="number" id="sleep" min="0" max="24" step="0.5" placeholder="0"
                        class="w-16 border border-black bg-white px-2 py-1 rounded text-sm outline-none focus:ring-2 focus:ring-black/20">
                </div>

                <div class="flex justify-center pt-6">
                    <button type="submit" class="bg-[#4285f4] text-white border border-black px-24 py-2 rounded-md font-medium shadow-sm hover:bg-blue-600 transition-colors">
                        Submit Check-In
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function updateVal(id) {
            const slider = document.getElementById(id);
            const output = document.getElementById(id + 'Val');
            output.innerHTML = slider.value;
        }
    </script>

</body>
</html>
