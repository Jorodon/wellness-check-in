<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">

    <script>
        //Sends login data to backend when submit button is clicked, verifies and redirects to dashbaord if valid
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('form').addEventListener('submit', async (e) => {
                e.preventDefault();

                const loginFormData = {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                }

                const loginResponse = await fetch("{{ url_for('auth.login') }}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginFormData)
                });

                const loginReturn = await loginResponse.json();

                if (loginResponse.ok) {
                    localStorage.setItem('jwtToken', loginReturn['access-token']);
                    window.location.href = "/home";
                } else {
                    alert(loginReturn.error || "An unknown error has occurred");
                }
            });
        });
    </script>
</head>
<body>
    <h1 class="text-3xl font-bold text-center my-8">Login</h1>

    <!-- Login Form -->
    <div>
        <form class="max-w-3xl mx-auto" action="{{ url_for('auth.login') }}" method="POST">
            <div class="mt-4">
                <label for "email" class="block mb-3 text-sm font-medium text-heading">Email</label>
                <input type="email" id="email" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="JohnS@email.com" required>
            </div>
            <div class="mt-4">
                <label for "password" class="block mb-3 text-sm font-medium text-heading">Password</label>
                <input type="password" id="password" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="JohnS@email.com" required>
            </div>
            <div class="flex items-center justify-center mt-4">
                <button type="submit" class="btn btn-md block mb-3 bg-neutral-secondary-medium border border-default-medium text-sm font-medium rounded-base focus:ring-brand focus:border-brand text-heading mx-auto shadow-xs">Submit</button>
            </div>
        </form>
    </div>
</body>

</html>
