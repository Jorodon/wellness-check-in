<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../../static/css/output.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>

    <script>

      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        var eventDay = new Date();
        var calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            buttonText: {
                today: 'Today'
            },
            events: [
                {
                    title: 'Learn JavaScript',
                    start: eventDay.toISOString().split('T')[0],
                    classNames: ['fc-event-primary']
                }
            ]
        });
        calendar.render()
      });

    </script>

</head>
<body>

    <nav>
       
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <ul class="menu menu-horizontal px-1">
                    <li><a href="{{ url_for('main.login_page') }}">Login page</a></li>
                    <li><a href="{{ url_for('main.home_page') }}">Dashboard</a></li>
                    <li><a href="{{ url_for('main.checkin_page') }}">Daily Check-In</a></li>
                    <li><a href="{{ url_for('main.weekly_tasks') }}">Weekly Tasks</a></li>
                    <li><a href="{{ url_for('main.journal_page') }}">Journal</a></li>
                    <li><a href="{{ url_for('main.statistics_page') }}">Statistics</a></li>
                    <li><a href="{{ url_for('main.resources_page') }}">Resources</a></li>
                </ul>
                </div>
            <div class="navbar-center">
                <a class="btn btn-ghost text-xl">Gator Check-In</a>
            </div>
            <div class="navbar-end">
                <button class="btn btn-ghost btn-circle">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /> </svg>
                </button>
                <button class="btn btn-ghost btn-circle">
                    <div class="indicator">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /> </svg>
                        <span class="badge badge-xs badge-primary indicator-item"></span>
                    </div>
                </button>
            </div>
        </div>


    </nav>

    <header>
        Weekly Tasks/Events
    </header>

    <main>
        <section>
            <div class="card flex flex-row not-prose p-4 min-h-screen gap-4">
                <div id='calendar' class="flex-1"></div>
                <div class="w-1/5 bg-base-100 border p-4">
                    <h2 class="font-semibold mb-4">Upcoming Events</h2>
                </div>
            </div>
        </section>

        <section>
            <button class="btn" onclick="my_modal_3.showModal()">open modal</button>
            <dialog id="my_modal_3" class="modal">
                <div class="modal-box">
                    <form method="dialog">
                        <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
                    </form>
                    <h3 class="test-lg font-bold">Create a task</h3>
                    <p class="py-4">Additional Dialog</p>
                </div>
            </dialog>
        </section>
    </main>
</body>
</html>
