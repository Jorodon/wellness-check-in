        const calendar = document.getElementById('calendar')
        let selectedEvent = null
        let selectedDateInfo = null
        function addDays(date, days) {
            const result = new Date(date)
            result.setDate(result.getDate() + days)
            return result
        }
        function formatDate(date) {
            return date.toLocaleDateString('en-GB', {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
            })
        }

        const today = new Date()
        
        const events = [
            {
            title: 'Past Event',
            start: addDays(today, -2).toISOString().split('T')[0],
            classNames: ['fc-event-info']
            },
            {
            title: 'All Day Event',
            start: addDays(today, 2).toISOString().split('T')[0],
            classNames: ['fc-event-info']
            },
            {
            title: 'Long Event',
            start: addDays(today, 2).toISOString().split('T')[0],
            end: addDays(today, 5).toISOString().split('T')[0],
            classNames: ['fc-event-primary']
            }
        ]

        const calendarObj = new FullCalendar.Calendar(calendar, {
            initialView: 'dayGridMonth',
            editable: true,
            direction: 'ltr',
            eventResizableFromStart: true,
            selectable: true,
            headerToolbar: {
            left: 'title prev,next',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listMonth'
            },
            events: events,
            eventClick: function (info) {
            selectedEvent = info.event
            document.getElementById('modalTitle').textContent = `${formatDate(info.event.start)}`
            document.getElementById('eventTitle').value = info.event.title
            document.getElementById('modalTrigger').click()
            }
        })

        calendarObj.render()
        })
    </script>

    <script>
        window.addEventListener('DOMContentLoaded', function() {
            //let data = ["Temp", "TEmp2", "Temp3"];
            let data = 
            {
                "day": [
                    {
                        "name": "Monday",
                        "tasks": [
                            "Take dog for walk",
                            "Take a shower"
                        ]
                    },
                    {
                        "name": "Tuesday",
                        "tasks": [
                            "Fix car",
                            "Go to doctors"
                        ]
                    },
                    {
                        "name": "Thursday",
                        "tasks": [
                            "Fight a wall"
                        ]
                    },
                ]
            };
            
            let dayList = document.getElementById('day-list');
            //let taskList = document.getElementById("task-items");

            for (let i = 0; i < data.day.length; ++i) {
                let dayArr = data.day[i];
                let dayHeader = document.createElement('h3');
                dayHeader.innerText = dayArr.name;
                dayHeader.classList.add('text-lg', 'font-bold');
                dayList.append(dayHeader);

                let taskItems = document.createElement('ul');
                taskItems.classList.add('text-md', 'font-normal');
                //ul.innerText = dayObj.name;
                for (let j = 0; j < dayArr.tasks.length; ++j) {
                    let li = document.createElement('li');
                    li.innerText = dayArr.tasks[j];
                    taskItems.appendChild(li);
                }
                dayList.appendChild(taskItems);
            }

        });
    </script>
