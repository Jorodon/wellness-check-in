<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../../static/css/output.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>

    <script defer>
        //Helper function to fetch all events/reminders from backend
        async function fetchEvents(info, successCallback, failureCallback) {
            try {
                const token = localStorage.getItem('jwtToken');
                const eventHistoryResponse = await fetch('/calendar/events', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                });

                if (eventHistoryResponse.status === 404) {
                    console.error("No events have been added yet.");
                }

                const events = await eventHistoryResponse.json();
                successCallback(events)
            } catch (error){
                console.error("No events have been added yet.");
            }
        }
        
        //Helper function to add days to dates
        function addDays(date, days) {
            const result = new Date(date)
            result.setDate(result.getDate() + days)
            return result
        }

        const today = new Date()

        let selectedEvent = null
        let selectedDateInfo = null

        document.addEventListener('DOMContentLoaded', function () {
            const calendar = document.getElementById('calendar')
            const calendarList = document.getElementById('calendar-list')
            const eventForm = document.getElementById('submission-form')
            const deleteEvent = document.getElementById('delete-event')

            //Creates and defines the main calendar (on the left)
            const calendarObj = new FullCalendar.Calendar(calendar, {
                initialView: 'dayGridMonth',
                editable: true,
                direction: 'ltr',
                eventResizableFromStart: true,
                selectable: true,
                headerToolbar: {
                left: 'title prev,next',
                right: 'dayGridMonth'
                },
                events: fetchEvents,
                //Controls reminder creation modal when clicking on empty spot on calendar
                select: async function (info) {
                    selectedEvent = null
                    document.getElementById('reminder-header').textContent = 'Create a New Reminder'
                    document.querySelector('#reminder-creation-modal #reminder-name').value = ''
                    document.querySelector('#reminder-creation-modal #flatpickr-start-date').value = info.start.toISOString().split('T')[0]
                    document.querySelector('#reminder-creation-modal #flatpickr-end-date').value = addDays(info.end, -1).toISOString().split('T')[0]
                    document.querySelector('#reminder-creation-modal #reminder-description').value = ''
                    document.getElementById('delete-button').classList.add('hidden')
                    document.getElementById('submit-button').textContent = 'Create Reminder'

                    document.getElementById('reminder-creation-modal').showModal()
                },
                //Controls reminder edit/detail modal when clicking on existing event in calendar
                eventClick: function (info) {
                    selectedEvent = info.event
                    document.getElementById('reminder-header').textContent = 'Edit Reminder'
                    document.querySelector('#reminder-creation-modal #reminder-name').value = info.event.title
                    document.querySelector('#reminder-creation-modal #flatpickr-start-date').value = info.event.startStr.split('T')[0]
                    document.querySelector('#reminder-creation-modal #flatpickr-end-date').value = addDays(info.event.endStr, -1).toISOString().split('T')[0]
                    document.querySelector('#reminder-creation-modal #reminder-description').value = info.event.extendedProps.description
                    document.getElementById('delete-button').classList.remove('hidden')
                    document.getElementById('submit-button').textContent = 'Save Changes'

                    document.getElementById('reminder-creation-modal').showModal()
                }
            })

            //Creates and defines the secondary calendar (list on the right)
            const calendarListObj = new FullCalendar.Calendar(calendarList, {
                displayEventTime: false,
                initialView: 'listWeek',
                editable: true,
                direction: 'ltr',
                eventResizableFromStart: true,
                selectable: true,
                headerToolbar: {
                left: 'title',
                right: 'prev,next'
                },
                events: fetchEvents,
                //Controls reminder edit/detail modal when clicking on existing event in calendar list
                eventClick: function (info) {
                    selectedEvent = info.event;
                    document.getElementById('reminder-header').textContent = 'Edit Reminder';
                    document.querySelector('#reminder-creation-modal #reminder-name').value = info.event.title;
                    document.querySelector('#reminder-creation-modal #flatpickr-start-date').value = info.event.startStr.split('T')[0];
                    document.querySelector('#reminder-creation-modal #flatpickr-end-date').value = addDays(info.event.endStr, -1).toISOString().split('T')[0];
                    document.querySelector('#reminder-creation-modal #reminder-description').value = info.event.extendedProps.description;
                    document.getElementById('delete-button').classList.remove('hidden');
                    document.getElementById('submit-button').textContent = 'Save Changes';
                    
                    document.getElementById('reminder-creation-modal').showModal();
                }
            })
            
            calendarObj.render()
            calendarListObj.render()

            //Dual purpose - sends event info to backend upon creation/edit
            eventForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const startT = new Date(document.getElementById('flatpickr-start-date').value);
                const endT = new Date(document.getElementById('flatpickr-end-date').value);
                let eventType;
                if (startT.toISOString() === endT.toISOString()) {
                    eventType = ['fc-event-info'];
                }
                else {
                    eventType = ['fc-event-primary'];
                }
                const reminderData = {
                    title: document.getElementById('reminder-name').value,
                    description: document.getElementById('reminder-description').value,
                    start_time: startT.toISOString(),
                    end_time: addDays(document.getElementById('flatpickr-end-date').value, 1).toISOString(),
                    item_type: 'event',
                    class_names: eventType,
                    is_recurring: false,
                    recurrence: null,
                    repeat_count: 1
                };

                //Changes communication method depending on whether an event is created (POST) or updated (PUT)
                const editStatus = selectedEvent !== null;
                let eventUrl = '/calendar/create_events';
                let method = 'POST';
                if (editStatus) {
                    reminderData.id = selectedEvent.id;
                    eventUrl = 'calendar/events/' + selectedEvent.id;
                    method = 'PUT';
                }

                const token = localStorage.getItem('jwtToken');
                const reminderResponse = await fetch(eventUrl, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(reminderData)
                });

                const reminderReturn = await reminderResponse.text();
                if (!reminderResponse.ok) {
                    console.error(reminderReturn.error);
                }
                else {
                    document.getElementById('reminder-creation-modal').close();
                    calendarObj.refetchEvents();
                    calendarListObj.refetchEvents();
                }
            })

            //Deletes an existing reminder from the backend
            deleteEvent.addEventListener('submit', async (e) => {
                e.preventDefault();

                let eventUrl = 'calendar/event/' + selectedEvent.id;
                const token = localStorage.getItem('jwtToken');
                const reminderResponse = await fetch(eventUrl, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                });

                const reminderReturn = await reminderResponse.text();
                if (!reminderResponse.ok) {
                    console.error(reminderReturn.error);
                }
                else {
                    document.getElementById('reminder-creation-modal').close();
                    calendarObj.refetchEvents();
                    calendarListObj.refetchEvents();
                }
            })
        });
    </script>

    <script>
        //Creates datepickers for start and end date in the pop-up modals
        window.addEventListener('load', function () {
            flatpickr('#flatpickr-start-date', {
                monthSelectorType: 'static',
                static: true, 
                appendTo: document.querySelector('#reminder-creation-modal .modal-box')
            })
            flatpickr('#flatpickr-end-date', {
                monthSelectorType: 'static',
                static: true, 
                appendTo: document.querySelector('#reminder-creation-modal .modal-box')
            })
        });
    </script>

    <script>
        //Checks if user is logged in when loading page
        document.addEventListener('DOMContentLoaded', async function () {
            const token = localStorage.getItem('jwtToken');
            //CHANGE LINE BELOW TO NEW LINK
            const authResponse = await fetch('/checkins/today', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
            });

            // If no user is logged in, return to landing page
            if (authResponse.status === 401 || authResponse.status === 422) {
                window.location.href = "/";
                return;
            }

            //Otherwise, display user email in dropdown in navbar
            const authJsonData = await authResponse.json();
            document.getElementById('user-email-button').innerText = "Hello, " + authJsonData.email;

        });
        
        //Removes access token from storage and returns to landing page when signout button is clicked
        async function signoutClick() {
            localStorage.removeItem('jwtToken');
            window.location.href = "/";
        }

    </script>

</head>
<body class="h-screen">
    <header>
        <!-- Navbar -->
        <nav>
            <div class="navbar bg-base-100 shadow-sm">
                <div class="navbar-start">
                    <ul class="menu menu-horizontal px-1">
                        <li><a href="{{ url_for('main.home_page') }}">Dashboard</a></li>
                        <li><a href="{{ url_for('main.checkin_page') }}">Daily Check-In</a></li>
                        <li><a href="{{ url_for('main.weekly_tasks') }}">Weekly Tasks</a></li>
                        <li><a href="{{ url_for('main.journal_page') }}">Journal</a></li>
                        <li><a href="{{ url_for('main.statistics_page') }}">Statistics</a></li>
                        <li><a href="{{ url_for('main.resources_page') }}">Resources</a></li>
                    </ul>
                </div>
                <div class="navbar-center">
                    <a class="btn btn-ghost text-xl">Gator Check-In</a>
                </div>
                <div class="navbar-end">
                    <button type="button" id="account-dropdown-button" data-dropdown-toggle="account-dropdown" class="btn btn-ghost btn-circle">
                        <div class="indicator">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 32 32" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 15.503A5.041 5.041 0 1 0 16 5.42a5.041 5.041 0 0 0 0 10.083zm0 2.215c-6.703 0-11 3.699-11 5.5v3.363h22v-3.363c0-2.178-4.068-5.5-11-5.5z"/></svg>
                        </div>
                    </button>
                    <div id="account-dropdown" class="hidden">
                        <ul class="menu menu-vertical px-1">
                            <li>
                                <button type="button" id="user-email-button" class="btn btn-md block min-w-40 bg-neutral-secondary-medium border border-default-medium font-medium rounded-md text-sm text-red-300 mx-auto shadow-xs">Hello user</button>
                            </li>
                            <li>
                                <button type="button" id="signout-button" onclick="signoutClick()" class="btn btn-md block min-w-40 bg-neutral-secondary-medium border border-default-medium text-md font-semibold rounded-md focus:ring-brand focus:border-brand text-heading mx-auto shadow-xs">Signout</button>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="mx-auto max-w-screen-2xl h-screen p-6">
        <h1 class="text-3xl font-bold text-center my-8">Weekly Tasks</h1>

        <section>
            <div class="card flex flex-row gap-4 m-2">
                
                <!-- Main calendar -->
                <div id='calendar' class="flex-1 grow-4 p-4 bg-neutral-secondary-medium border border-default-medium rounded-md shadow-xs overflow-visible"></div>
                
                <!-- Secondary calendar (list) -->
                <div class="flex-1 flex flex-col grow p-4 bg-neutral-secondary-medium border border-default-medium rounded-md shadow-xs">
                    <h2 class="font-semibold mb-4">Upcoming Events</h2>
                    <div id="calendar-list" class="flex-1 max-h-full object-contain px-1 overflow-auto"></div>
                </div>
            </div>

            <!-- Reminder modal for creating/editing/viewing/deleting reminders -->
            <dialog id="reminder-creation-modal" class="modal" role="dialog" tabindex="-1">
                <div class="modal-box max-w-3xl">
                    <form id="close-form" method="dialog">
                        <button id="close-button" type="submit" class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
                    </form>
                    <form id="submission-form" class="max-w-3xl mx-auto">
                        <h3 id="reminder-header" class="test-lg font-bold">Create a Reminder</h3>
                        <div>
                            <div class="flex flex-row gap-4 my-4">
                                <div class="flex-1">
                                    <label for "reminder-name" class="block mb-3 text-sm font-medium text-heading">Task Name</label>
                                    <input type="text" id="reminder-name" class="bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Ex. Take the dog for a walk" required>
                                </div>
                            </div>
                            <div class="flex flex-row gap-8 mt-4">
                                <div class="">
                                    <label for "flatpickr-start-date" class="block mb-3 text-sm font-medium text-heading">Start Date</label>
                                    <input type="text" id="flatpickr-start-date" class="input max-w-md bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="YYYY-MM-DD" required>
                                </div>
                                <div class="justify-left">
                                    <label for "flatpickr-end-date" class="block mb-3 text-sm font-medium text-heading">End Date</label>
                                    <input type="text" id="flatpickr-end-date" class="input max-w-md bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="YYYY-MM-DD" required>
                                </div>      
                            </div>
                            <div class="mt-4">
                                <label for "reminder-description" class="block mb-3 text-sm font-medium text-heading">Task Description</label>
                                <textarea id="reminder-description" rows="15" class="w-full p-3 bg-neutral-secondary-medium border border-default-medium rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Write a short description..." required></textarea>
                            </div>
                            <div class="justify-center mt-4 gap-8">
                                <button type="submit" id="submit-button" class="btn btn-md block mb-3 bg-neutral-secondary-medium border border-default-medium text-sm font-medium rounded-base focus:ring-brand focus:border-brand text-heading mx-auto shadow-xs">Submit</button>
                            </div>
                        </div>
                    </form>
                    <form id="delete-event">
                        <button type="submit" id="delete-button" class="btn btn-md block mb-3 bg-neutral-secondary-medium border border-default-medium text-sm font-medium rounded-base focus:ring-brand focus:border-brand text-heading mx-auto shadow-xs">Delete Reminder</button>
                    </form>
                </div>
            </dialog>
        </section>
    </main>
</body>
</html>
