<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="../../static/css/output.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/calendar/apexcharts.min.js') }}"></script>
    <!-- <script src="/node_modules/apexcharts/dist/apexcharts.min.js"></script> -->
<!-- <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.46.0/dist/apexcharts.min.js"></script> -->

    <script>
        async function fetchTrendHistory() {
            try {
                const token = localStorage.getItem('jwtToken');
                const trendHistoryResponse = await fetch('/trends/weekly-history', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                });

                if (trendHistoryResponse.status === 404) {
                    console.error(trendHistoryResponse.message);
                }

                const trendHistoryData = await trendHistoryResponse.json();
                return trendHistoryData;
            } catch (error){
                console.error("Something went wrong.");
            }
        }

        async function fetchTrendAverage() {
            try {
                const token = localStorage.getItem('jwtToken');
                const trendAverageResponse = await fetch('/trends/weekly-average', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                });

                if (trendAverageResponse.status === 404) {
                    console.error(trendAverageResponse.message);
                }

                const trendAverageData = await trendAverageResponse.json();
                return trendAverageData;
            } catch (error){
                console.error("Something went wrong.");
            }
        }

        //function 
        const drawGraph = async() => {
        //window.onload = async function drawGraph() {

            const getBrandColor = () => {
            const computedStyle = getComputedStyle(document.documentElement);
            return computedStyle.getPropertyValue('--color-graph-1').trim();
            };

            const getBrandSecondaryColor = () => {
            const computedStyle = getComputedStyle(document.documentElement);
            return computedStyle.getPropertyValue('--color-graph-2').trim();
            };

            const getBrandTertiaryColor = () => {
            const computedStyle = getComputedStyle(document.documentElement);
            return computedStyle.getPropertyValue('--color-graph-3').trim();
            };

            const brandColor = getBrandColor();
            const brandSecondaryColor = getBrandSecondaryColor();
            const brandTertiaryColor = getBrandTertiaryColor();

            const trendHistoryData = await fetchTrendHistory();
            const options = {
            chart: {
                height: "100%",
                maxWidth: "100%",
                type: "line",
                fontFamily: "Inter, sans-serif",
                dropShadow: {
                enabled: false,
                },
                toolbar: {
                show: true,
                },
            },
            tooltip: {
                enabled: true,
                x: {
                show: false,
                },
            },
            dataLabels: {
                enabled: false,
            },
            stroke: {
                width: 6,
                curve: 'smooth'
            },
            grid: {
                show: true,
                strokeDashArray: 4,
                padding: {
                left: 2,
                right: 2,
                top: -26
                },
            },
            series: [
                {
                name: "Mood",
                data: trendHistoryData.map(e => Object.values(e)[1]),
                color: brandColor,
                },
                {
                name: "Stress",
                data: trendHistoryData.map(e => Object.values(e)[2]),
                color: brandSecondaryColor,
                },
                {
                name: "Energy",
                data: trendHistoryData.map(e => Object.values(e)[3]),
                color: brandTertiaryColor,
                },
            ],
            legend: {
                show: false
            },
            stroke: {
                curve: 'smooth'
            },
            xaxis: {
                categories: trendHistoryData.map(e => Object.values(e)[0]),
                labels: {
                show: true,
                style: {
                    fontFamily: "Inter, sans-serif",
                    cssClass: 'text-xs font-normal fill-body'
                }
                },
                axisBorder: {
                show: false,
                },
                axisTicks: {
                show: false,
                },
            },
            yaxis: {
                show: true,
            },
            }

            const chart = new ApexCharts(document.getElementById("line-chart"), options);
            chart.render();
        }

        const drawTable = async() => {
            const trendHistoryData = await fetchTrendHistory();
            const trendAverageData = await fetchTrendAverage();
            const today = new Date();
            let latestData = trendHistoryData.at(-1);
            //let latestDate = new Date(latestData);
            //if (latestDate.toISOString().split('T')[0] === today.toISOString().split('T')[0]) {
            if (latestData.date === today.toISOString().split('T')[0]) {
                document.getElementById('stress-today').textContent = latestData.stress;
                document.getElementById('mood-today').textContent = latestData.mood;
                document.getElementById('energy-today').textContent = latestData.energy;
                document.getElementById('sleep-today').textContent = latestData.sleep;
            }
            else {
                document.getElementById('stress-today').textContent = 'NA';
                document.getElementById('mood-today').textContent = 'NA';
                document.getElementById('energy-today').textContent = 'NA';
                document.getElementById('sleep-today').textContent = 'NA';
            }

            function round(data) {
                return Number.parseFloat(data).toFixed(2);
            }
            document.getElementById('stress-average').textContent = round(trendAverageData.avg_stress);
            document.getElementById('mood-average').textContent = round(trendAverageData.avg_mood);
            document.getElementById('energy-average').textContent = round(trendAverageData.avg_energy);
            document.getElementById('sleep-average').textContent = round(trendAverageData.avg_sleep)


        }


        document.addEventListener('DOMContentLoaded', drawGraph);
        document.addEventListener('DOMContentLoaded', drawTable);
    </script>
</head>

<body class="flex flex-col h-lvh max-w-screen-2xl overflow-hidden">

    <main class="flex flex-col grow mx-auto p-6 w-full h-0">

        <section class="flex flex-row gap-8 justify-items-center mb-4 h-1/4">
            <div class="w-full p-4 bg-neutral-secondary-medium border border-default-medium rounded-md shadow-xs">
                <h2 class="text-xl font-bold mb-4">Averages</h2>
                <div class="flex">
                    <table class="grow table-auto border border-default-medium border-gray-400 rounded-md">
                        <thead>
                            <tr>
                                <th class="border border-grey-300">Category</th>
                                <th class="border border-grey-300">Average</th>
                                <th class="border border-grey-300">Today</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="border border-grey-300">Stress</td>
                                <td id="stress-average" class="border border-grey-300"></td>
                                <td id="stress-today" class="border border-grey-300"></td>
                            </tr>
                            <tr>
                                <td class="border border-grey-300">Mood</td>
                                <td id="mood-average" class="border border-grey-300"></td>

                            <tr>
                                <td class="border border-grey-300">Energy</td>
                                <td id="energy-average" class="border border-grey-300"></td>
                                <td id="energy-today" class="border border-grey-300"></td>
                            </tr>
                            <tr>
                                <td class="border border-grey-300">Sleep</td>
                                <td id="sleep-average" class="border border-grey-300"></td>
                                <td id="sleep-today" class="border border-grey-300"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="w-full p-4 bg-neutral-secondary-medium border border-default-medium rounded-md shadow-xs">
                <h2 class="text-xl font-bold mb-4">Temporary</h2>
            </div>
        </section>

        <section class="grow min-h-0 justify-items-center">
            <div class="size-full bg-neutral-primary-soft border border-default rounded-base shadow-xs p-4 md:p-6">
                <div id="line-chart" class="size-full"></div>
                <!-- <div class="items-center border-light border-t justify-between mt-4 md:mt-6 pt-4 md:pt-6"></div> -->

        </section>
